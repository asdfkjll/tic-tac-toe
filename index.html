<!doctype html>

<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tic Tac Toe</title>

    <link rel="stylesheet" href="reset.css?v=1.0">
    <link rel="stylesheet" href="styles.css?v=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&display=swap" rel="stylesheet">

    <script src="scripts.js" defer></script>
</head>

<body>
    <div class="container">
	<div class="msg">Hello, Tic Tac Toe</div>

	<dialog id="game-options">
	    <button autofocus>Close</button>
	    <form method="dialog">
		<div class="input-group">
		    <label for="playerOne-name">Player 1 (X) Name:</label>
		    <input type="text" id="playerOne-name" placeholder="Enter Name" required>
		</div>

		<div class="input-group">
		    <label for="playerTwo-name">Player 2 (O) Name:</label>
		    <input type="text" id="playerTwo-name" placeholder="Enter Name" required>
		</div>

		<div class="actions">
		    <button type="submit" id="start-btn">Start Game</button>
		    <button type="button" id="reset-btn">Reset Game</button>
		</div>
	    </form>
	</dialog>

	<button id="game-options-open-btn">Game Options</button>

	<div class="board">
	    <div class="box" data-x="0" data-y="0"></div>
	    <div class="box" data-x="1" data-y="0"></div>
	    <div class="box" data-x="2" data-y="0"></div>

	    <div class="box" data-x="0" data-y="1"></div>
	    <div class="box" data-x="1" data-y="1"></div>
	    <div class="box" data-x="2" data-y="1"></div>

	    <div class="box" data-x="0" data-y="2"></div>
	    <div class="box" data-x="1" data-y="2"></div>
	    <div class="box" data-x="2" data-y="2"></div>
	</div>

	<div class="info">
	    <span class="info-p1"></span>
	    <span class="info-p2"></span>
	</div>
    </div>
</body>
</html>
